server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: product
          uri: http://localhost:8081
          predicates:
            - Path=/products/**
        - id: order
          uri: http://localhost:8082
          predicates:
            - Path=/orders/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
